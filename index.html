<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2333c738'%3E%3Cpath d='M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z'/%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>What's for Dinner?</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#33c738',
              'background-light': '#f6f8f6',
              'background-dark': '#131f13',
            },
            fontFamily: {
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            borderRadius: {
              DEFAULT: '0.5rem',
              lg: '1rem',
              xl: '1.5rem',
              full: '9999px',
            },
          },
        },
      };
    </script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        vertical-align: middle;
      }
      .chip-animate {
        animation: chipPop 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes chipPop {
        from {
          opacity: 0;
          transform: scale(0.6);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }
      .card-animate {
        animation: cardUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) both;
      }
      @keyframes cardUp {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
    <title>What's for Dinner? | Recipe Finder from Your Fridge</title>
    <meta name="description" content="Enter ingredients you have and instantly find recipes to cook tonight. 110+ Indian, Italian, Chinese and more recipes."/>
    <meta name="keywords" content="recipe finder, indian recipes, what to cook tonight, ingredient search"/>
    <meta property="og:title" content="What's for Dinner?"/>
    <meta property="og:description" content="Turn your fridge into a feast. Find recipes from ingredients you already have."/>
    <meta property="og:url" content="https://fridgetofeast.com"/>
    <meta property="og:type" content="website"/>
  </head>
  <body class="font-display bg-background-light text-slate-900 antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
